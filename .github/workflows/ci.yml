name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo: [backend, frontend]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd ${{ matrix.repo }}
          npm ci
      - name: Run tests
        run: |
          cd ${{ matrix.repo }}
          npm test

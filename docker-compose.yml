version: '3.9'

services:
  backend:
    build: ./backend
    command: npm run dev
    ports:
      - '5000:5000'
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env.example
  frontend:
    build: ./frontend
    command: npm run dev -- --host 0.0.0.0
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
    env_file:
      - ./frontend/.env.example
